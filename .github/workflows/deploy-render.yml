name: Deploy to Render

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 app.py predictor.py mlops/ --max-line-length=120 --exit-zero
    
    - name: Run tests
      run: pytest tests/ -v --cov=. || true
    
    - name: Train & evaluate models
      env:
        MLFLOW_TRACKING_URI: http://localhost:5000
      run: |
        python mlops/train_pipeline.py || true

  deploy-render:
    needs: test-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Render
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        # Trigger Render deployment via API
        SERVICE_ID=${{ secrets.RENDER_SERVICE_ID }}
        DEPLOY_URL="https://api.render.com/deploy/$SERVICE_ID?key=${{ secrets.RENDER_DEPLOY_HOOK }}"
        
        echo "Triggering Render deployment..."
        curl -X POST $DEPLOY_URL
        
        echo "Deployment triggered successfully!"
        echo "Check deployment at: https://dashboard.render.com/services"
    
    - name: Verify deployment
      run: |
        echo "Waiting for deployment to be ready..."
        sleep 30
        
        RENDER_SERVICE_URL=${{ secrets.RENDER_SERVICE_URL }}
        
        # Check health endpoint
        for i in {1..10}; do
          if curl -f $RENDER_SERVICE_URL/health; then
            echo "✅ Service is healthy!"
            exit 0
          fi
          echo "Attempt $i: Service not ready yet, waiting..."
          sleep 10
        done
        
        echo "❌ Service failed to become healthy"
        exit 1
    
    - name: Notify deployment
      if: success()
      run: |
        echo "🚀 Successfully deployed to Render!"
        echo "Service URL: ${{ secrets.RENDER_SERVICE_URL }}"
        echo "Dashboard: https://dashboard.render.com/services"
