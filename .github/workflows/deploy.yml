name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  KUBE_NAMESPACE: ecoguard

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract image tag
      id: image
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          TAG=${GITHUB_REF#refs/tags/}
        else
          TAG=${{ github.sha }}
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG" >> $GITHUB_OUTPUT

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl config use-context ${{ secrets.KUBE_CONTEXT }}
        kubectl set image deployment/ecoguard-api \
          ecoguard-api=${{ steps.image.outputs.image }} \
          -n $KUBE_NAMESPACE
        kubectl rollout status deployment/ecoguard-api -n $KUBE_NAMESPACE

    - name: Verify deployment
      run: |
        kubectl get deployments -n $KUBE_NAMESPACE
        kubectl get pods -n $KUBE_NAMESPACE
        kubectl logs -l app=ecoguard-api -n $KUBE_NAMESPACE --tail=50
